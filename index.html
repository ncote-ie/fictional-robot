<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* S'assure que le body prend toute la place sans marges */
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; /* Centre horizontalement */
            align-items: center;     /* Centre verticalement */
            height: 100vh;           /* Prend toute la hauteur du widget */
            font-family: 'Avenir Next', 'Arial', sans-serif; /* Police standard ArcGIS */
            background-color: transparent; /* Fond transparent pour s'intégrer à votre app */
            overflow: hidden;        /* Empêche les barres de défilement */
        }

        /* Style des chiffres uniquement */
        .time-only { 
            font-size: 48px;        /* Taille ajustable selon vos besoins */
            font-weight: bold; 
            color: #005e95;         /* Couleur bleu standard ArcGIS, à modifier si besoin */
            line-height: 1;         /* Réduit l'espace au-dessus/en-dessous */
        }
    </style>
</head>
<body>
    
    <div id="timer" class="time-only">04:00</div>

    <script>
        const DURATION = 240; // 4 minutes en secondes
        let timeRemaining = DURATION;
        const display = document.getElementById('timer');

        function startTimer() {
            // Exécute la fonction toutes les secondes
            setInterval(() => {
                timeRemaining--;

                // Logique de boucle
                if (timeRemaining < 0) {
                    timeRemaining = DURATION; // Recommence à 4:00
                }

                // Calcul minutes et secondes
                let mins = Math.floor(timeRemaining / 60);
                let secs = timeRemaining % 60;

                // Affichage formaté (ex: 03:09)
                display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
            }, 1000);
        }

        // Lance le timer au chargement de la page
        window.onload = startTimer;
    </script>
</body>
</html>
