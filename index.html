<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcGIS Timer Bar</title>
    <style>
        /* S'assure que le body prend toute la place et centre la barre */
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; /* Centre horizontalement */
            align-items: center;     /* Centre verticalement */
            height: 100vh;           /* Prend toute la hauteur du widget */
            background-color: transparent; /* Fond transparent pour s'intégrer à ArcGIS */
            overflow: hidden;        /* Empêche les barres de défilement */
        }

        /* Conteneur de fond de la barre */
        .progress-container {
            width: 90%;           /* Largeur de la barre par rapport au widget */
            height: 10px;          /* Hauteur de la ligne (ajustable) */
            background-color: #e0e0e0; /* Couleur de fond (gris clair) quand la ligne est vide */
            border-radius: 5px;   /* Bords arrondis */
            overflow: hidden;      /* Nécessaire pour l'effet de remplissage */
        }

        /* La ligne qui se réduit */
        .progress-fill {
            height: 100%;
            background-color: #007ac2; /* Couleur bleu standard ArcGIS (ajustable) */
            width: 100%;           /* Commence pleine */
            border-radius: 5px;
            /* Transition fluide d'une seconde pour un mouvement doux */
            transition: width 1s linear; 
        }
    </style>
</head>
<body>
    
    <div class="progress-container">
        <div id="fill" class="progress-fill"></div>
    </div>

    <script>
        const DURATION_SECONDS = 4 * 60; // 4 minutes = 240 secondes
        let timeRemaining = DURATION_SECONDS;
        const fillElement = document.getElementById('fill');

        function updateBar() {
            // Calcule le pourcentage restant
            const percentage = (timeRemaining / DURATION_SECONDS) * 100;
            
            // Met à jour la largeur de la ligne bleu
            fillElement.style.width = percentage + '%';

            // Logique de décompte et de boucle
            if (timeRemaining <= 0) {
                // Recommence instantanément
                timeRemaining = DURATION_SECONDS;
                // Désactive temporairement la transition pour un reset visuel immédiat
                fillElement.style.transition = 'none';
                fillElement.style.width = '100%';
                
                // Force le navigateur à calculer le style avant de réactiver la transition
                void fillElement.offsetWidth; 
                
                // Réactive la transition pour le décompte
                fillElement.style.transition = 'width 1s linear';
            } else {
                timeRemaining--;
            }
        }

        // Initialise l'état
        updateBar();

        // Lance la mise à jour toutes les secondes
        setInterval(updateBar, 1000);
    </script>
</body>
</html>
